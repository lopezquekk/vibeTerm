name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and create GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'vibeTerm ${{ github.ref_name }}'
          releaseBody: |
            ## Descarga

            Descarga el archivo `.dmg` de los assets de abajo e instálalo arrastrando vibeTerm a tu carpeta de Aplicaciones.

            > **Nota:** Al abrir por primera vez, haz clic derecho → Abrir para saltarte la advertencia de Gatekeeper (la app no está notarizada).
          releaseDraft: true
          prerelease: false
